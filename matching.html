<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Match | EduConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1><span class="highlight">Edu Connect</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li class="current"><a href="matching.html">Find Match</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="#" id="logout">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="matching">
        <div class="container">
            <h1>Find Your Match</h1>
            
            <div class="matching-filters">
                <h3>Filter Options</h3>
                <form id="filter-form">
                    <div class="filter-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject">
                            <option value="">All Subjects</option>
                            <option value="math">Mathematics</option>
                            <option value="science">Science</option>
                            <option value="english">English</option>
                            <option value="history">History</option>
                            <option value="computer">Computer Skills</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="distance">Distance (km)</label>
                        <input type="range" id="distance" name="distance" min="1" max="50" value="10">
                        <span id="distance-value">10 km</span>
                    </div>
                    
                    <div class="filter-group">
                        <label for="availability">Availability</label>
                        <select id="availability" name="availability">
                            <option value="">Any Time</option>
                            <option value="morning">Morning</option>
                            <option value="afternoon">Afternoon</option>
                            <option value="evening">Evening</option>
                            <option value="weekend">Weekend</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="button_1">Apply Filters</button>
                </form>
            </div>
            
            <div class="matching-results">
                <h3>Available Matches</h3>
                <div id="matches-container">
                    <!-- Matches will be loaded here by JavaScript -->
                    <div class="no-matches">Loading matches...</div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
             <p>&copy; 2025 EduConnect. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/matching.js"></script>
</body>
</html>
